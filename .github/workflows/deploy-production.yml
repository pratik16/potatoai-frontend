name: Deploy production frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate deployment secrets
        run: |
          test -n "${{ secrets.EC2_HOST }}" || { echo "Missing repository secret: EC2_HOST"; exit 1; }
          test -n "${{ secrets.EC2_USER }}" || { echo "Missing repository secret: EC2_USER"; exit 1; }
          test -n "${{ secrets.EC2_SSH_KEY }}" || { echo "Missing repository secret: EC2_SSH_KEY"; exit 1; }

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and build
        run: npm run build:ci

      - name: Verify build output
        run: |
          test -f dist/index.html || { echo "dist/index.html missing"; exit 1; }
          test -d dist/assets || { echo "dist/assets missing"; exit 1; }
          ls -la dist/

      - name: Package build
        run: tar -czf frontend-dist.tar.gz -C dist .

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/potatoaihub_deploy_key
          chmod 600 ~/.ssh/potatoaihub_deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload build to EC2
        run: |
          scp -i ~/.ssh/potatoaihub_deploy_key frontend-dist.tar.gz \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/potatoai-frontend-dist.tar.gz"

      - name: Publish build on EC2
        run: |
          ssh -i ~/.ssh/potatoaihub_deploy_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" <<'EOF'
          set -eux
          mkdir -p ~/potatoaihub/frontend-dist
          rm -rf ~/potatoaihub/frontend-dist
          mkdir -p ~/potatoaihub/frontend-dist
          tar -xzf /tmp/potatoai-frontend-dist.tar.gz -C ~/potatoaihub/frontend-dist
          rm -f /tmp/potatoai-frontend-dist.tar.gz
          if [ -d ~/potatoaihub/docker/.git ]; then
            git config --global --add safe.directory ~/potatoaihub/docker || true
            cd ~/potatoaihub/docker
            git pull origin master || true
          else
            cd ~/potatoaihub/docker
          fi
          COMPOSE="docker compose --env-file .env.production -f docker-compose.prod.yml"
          $COMPOSE up -d --force-recreate frontend edge
          EOF
