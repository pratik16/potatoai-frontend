name: Deploy production frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package build
        run: tar -czf frontend-dist.tar.gz -C dist .

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/potatoaihub_deploy_key
          chmod 600 ~/.ssh/potatoaihub_deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload build to EC2
        run: |
          scp -i ~/.ssh/potatoaihub_deploy_key frontend-dist.tar.gz \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/potatoai-frontend-dist.tar.gz"

      - name: Publish build on EC2
        run: |
          ssh -i ~/.ssh/potatoaihub_deploy_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" <<'EOF'
          set -e
          mkdir -p ~/potatoaihub
          rm -rf ~/potatoaihub/frontend-dist
          mkdir -p ~/potatoaihub/frontend-dist
          tar -xzf /tmp/potatoai-frontend-dist.tar.gz -C ~/potatoaihub/frontend-dist
          rm -f /tmp/potatoai-frontend-dist.tar.gz
          cd ~/potatoaihub/docker
          git pull origin master
          docker compose --env-file .env.production -f docker-compose.prod.yml up -d --force-recreate frontend edge
          EOF
